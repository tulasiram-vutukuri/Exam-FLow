<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examination in Progress | ExamPortal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .nav {
            justify-content: center;
        }

        .option-label:hover {
            border-color: var(--primary) !important;
            background: #f8fafc !important;
        }
    </style>
</head>

<body class="animate-slide-up">
    <nav class="nav">
        <h1 id="examTitle" style="font-size: 1.25rem;">Loading Examination...</h1>
    </nav>

    <div class="container" style="max-width: 900px;">
        <div id="questionContainer">
            <!-- Questions will be loaded here dynamically from student.js -->
            <div style="text-align: center; padding: 5rem;">
                <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: var(--primary);"></i>
                <p style="margin-top: 1.5rem; color: var(--text-muted); font-weight: 500;">Securing your examination
                    session...</p>
            </div>
        </div>
    </div>

    <script src="../js/student.js"></script>
</body>

</html>
