<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attend Exam - Online Exam System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="nav">
        <h1 id="examTitle">Loading Exam...</h1>
        <div id="timer" style="font-weight: bold; font-size: 1.2rem; color: #ef4444;"></div>
    </nav>

    <div class="container" style="max-width: 800px;">
        <div id="questionContainer">
            <!-- Questions will be loaded here -->
        </div>
        <button id="submitExamBtn" class="btn btn-secondary"
            style="width: 100%; margin-top: 2rem; background: #10b981; color: white; display: none;">Submit
            Exam</button>
    </div>

    <script src="../js/student.js"></script>
</body>

</html>
