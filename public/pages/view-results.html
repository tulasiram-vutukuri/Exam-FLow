<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Results - Online Exam System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="nav">
        <h1>Student Results</h1>
        <a href="admin-dashboard.html" class="btn btn-primary">Back to Dashboard</a>
    </nav>

    <div class="container">
        <div class="card">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid #eee; text-align: left;">
                        <th style="padding: 1rem;">Student Username</th>
                        <th style="padding: 1rem;">Score</th>
                        <th style="padding: 1rem;">Total</th>
                        <th style="padding: 1rem;">Percentage</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <!-- Results will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('examId');

        async function loadResults() {
            try {
                const response = await fetch(`/api/admin/results/${examId}`);
                const results = await response.json();

                const tableBody = document.getElementById('resultsTableBody');
                tableBody.innerHTML = results.map(res => `
                    <tr style="border-bottom: 1px solid #eee;">
                        <td style="padding: 1rem;">${res.student_username}</td>
                        <td style="padding: 1rem;">${res.score}</td>
                        <td style="padding: 1rem;">${res.total}</td>
                        <td style="padding: 1rem;">${((res.score / res.total) * 100).toFixed(2)}%</td>
                    </tr>
                `).join('');

                if (results.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="padding: 2rem; text-align: center;">No students have attended this exam yet.</td></tr>';
                }
            } catch (error) {
                console.error('Error loading results:', error);
            }
        }

        if (examId) loadResults();
    </script>
</body>

</html>
