<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam - Online Exam System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="nav">
        <h1>Create New Exam</h1>
        <a href="admin-dashboard.html" class="btn btn-primary">Back to Dashboard</a>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card" id="examFormSection">
            <h2>Exam Details</h2>
            <form id="createExamForm">
                <div class="form-group">
                    <label for="title">Exam Title</label>
                    <input type="text" id="title" required placeholder="e.g. JavaScript Basics">
                </div>
                <div class="form-group">
                    <label for="scheduledAt">Scheduled Time</label>
                    <input type="datetime-local" id="scheduledAt" required>
                </div>
                <div class="form-group">
                    <label for="duration">Duration (minutes)</label>
                    <input type="number" id="duration" required min="1" value="30">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Exam</button>
            </form>
        </div>

        <div class="card" id="questionSection" style="display: none; margin-top: 2rem;">
            <h2>Add MCQ Questions</h2>
            <p>Exam Code: <strong id="generatedCode"></strong></p>
            <form id="addQuestionForm">
                <input type="hidden" id="currentExamId">
                <div class="form-group">
                    <label for="questionText">Question Text</label>
                    <textarea id="questionText" required rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="optionA">Option A</label>
                    <input type="text" id="optionA" required>
                </div>
                <div class="form-group">
                    <label for="optionB">Option B</label>
                    <input type="text" id="optionB" required>
                </div>
                <div class="form-group">
                    <label for="optionC">Option C</label>
                    <input type="text" id="optionC" required>
                </div>
                <div class="form-group">
                    <label for="optionD">Option D</label>
                    <input type="text" id="optionD" required>
                </div>
                <div class="form-group">
                    <label for="correctOption">Correct Answer</label>
                    <select id="correctOption" required>
                        <option value="A">Option A</option>
                        <option value="B">Option B</option>
                        <option value="C">Option C</option>
                        <option value="D">Option D</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Save & Next Question</button>
            </form>
            <hr style="margin: 2rem 0;">
            <button onclick="publishExam()" class="btn btn-secondary"
                style="width: 100%; background: #10b981; color: white;">Finish and Publish Exam</button>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>

</html>
