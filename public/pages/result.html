<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Result | ExamPortal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .result-card {
            width: 100%;
            max-width: 500px;
            padding: 4rem 3rem;
            text-align: center;
            border-radius: 32px;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body>
    <div class="card result-card" style="box-shadow: var(--shadow-lg);">
        <div id="successTick"
            style="width: 80px; height: 80px; background: #dcfce7; color: #166534; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 2rem;">
            <i class="fas fa-check"></i>
        </div>

        <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem;">Examination Submitted!</h2>
        <p style="color: var(--text-muted); font-weight: 500; margin-bottom: 2.5rem;">Your responses have been securely
            recorded.</p>

        <div
            style="background: var(--bg-main); padding: 2rem; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 3rem;">
            <p
                style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">
                Your Final Score</p>
            <div style="display: flex; justify-content: center; align-items: baseline; gap: 0.5rem;">
                <h3 id="finalScore" style="font-size: 3.5rem; font-weight: 800; color: var(--primary);">0</h3>
                <span style="font-size: 1.5rem; color: var(--text-muted); font-weight: 600;">/</span>
                <span id="finalTotal" style="font-size: 1.5rem; color: var(--text-muted); font-weight: 600;">0</span>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <button onclick="viewDetails()" class="btn btn-primary"
                style="padding: 1rem; border-radius: 12px; font-size: 1rem;">
                <i class="fas fa-search-plus"></i> View Performance Breakdown
            </button>
            <a href="student-dashboard.html" class="btn btn-secondary"
                style="padding: 1rem; border-radius: 12px; font-size: 1rem;">
                <i class="fas fa-home"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        const score = localStorage.getItem('lastScore') || 0;
        const total = localStorage.getItem('lastTotal') || 0;
        const resultId = localStorage.getItem('lastResultId');

        document.getElementById('finalScore').innerText = score;
        document.getElementById('finalTotal').innerText = total;

        function viewDetails() {
            if (resultId) {
                window.location.href = `result-details.html?id=${resultId}`;
            } else {
                alert('Detailed breakdown not available for this session.');
            }
        }
    </script>
</body>

</html>
