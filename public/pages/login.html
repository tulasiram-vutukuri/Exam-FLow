<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Exam System</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }

        .login-card {
            max-width: 450px;
            width: 100%;
            padding: 3rem;
            animation: fadeIn 0.6s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h2 {
            font-size: 2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Please enter your credentials to continue</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">User ID / Username</label>
                    <input type="text" id="username" placeholder="e.g. VTU12345 or Admin@09" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div id="error"
                    style="color: #ef4444; margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center; display: none; background: #fee2e2; padding: 0.75rem; border-radius: 8px;">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px;">
                    Sign In
                </button>
            </form>

            <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border); padding-top: 2rem;">
                <p style="font-size: 0.9rem; color: var(--text-muted);">
                    Exam Portal System &copy; 2026
                </p>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>

</html>
