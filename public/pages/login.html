<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ExamPortal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .abstract-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="abstract-circle"
        style="width: 400px; height: 400px; background: rgba(99, 102, 241, 0.15); top: -100px; left: -100px;"></div>
    <div class="abstract-circle"
        style="width: 300px; height: 300px; background: rgba(14, 165, 233, 0.15); bottom: -50px; right: -50px;"></div>

    <div class="card login-card" style="border-radius: 32px; box-shadow: var(--shadow-lg);">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div
                style="width: 64px; height: 64px; background: var(--primary-gradient); border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);">
                <i class="fas fa-bolt"></i>
            </div>
            <h1
                style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.025em; background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                ExamPortal</h1>
            <p style="color: var(--text-muted); font-weight: 500; margin-top: 0.5rem;">The next generation of
                examinations.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Institutional ID / Email</label>
                <div style="position: relative;">
                    <i class="far fa-user"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" id="username" placeholder="Enter your ID" style="padding-left: 2.75rem;"
                        required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Security Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" id="password" placeholder="••••••••" style="padding-left: 2.75rem;" required>
                </div>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-bottom: 2rem;">
                <a href="#"
                    style="font-size: 0.8rem; font-weight: 600; color: var(--primary); text-decoration: none;">Forgot
                    Password?</a>
            </div>
            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; font-size: 1rem; border-radius: 12px;">
                Sign In To Account <i class="fas fa-arrow-right" style="margin-left: 0.5rem;"></i>
            </button>
        </form>

        <p id="errorMsg"
            style="color: var(--accent); text-align: center; margin-top: 1.5rem; font-size: 0.85rem; font-weight: 600; display: none;">
        </p>

        <div style="margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border); text-align: center;">
            <p style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">Authorized Personnel Only</p>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>

</html>
