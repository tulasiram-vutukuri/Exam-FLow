<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ExamPortal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .abstract-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
    </style>
</head>

<body>


    <div class="card login-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <img src="https://upload.wikimedia.org/wikipedia/en/e/e9/Veltech_Rangarajan_Dr._Sagunthala_R%26D_Institute_of_Science_and_Technology_logo.png" alt="Logo" style="max-width: 150px; height: auto; margin-bottom: 1.5rem;" />
            <h1 style="font-size: 1.75rem; font-weight: 700; letter-spacing: -0.025em; color: var(--text-main);">
                ExamPortal</h1>
            <p style="color: var(--text-muted); font-weight: 500; margin-top: 0.5rem;">The next generation of
                examinations.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Institutional ID / Email</label>
                <div style="position: relative;">
                    <i class="far fa-user"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="text" id="username" placeholder="Enter your ID" style="padding-left: 2.75rem;"
                        required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Security Password</label>
                <div style="position: relative;">
                    <i class="fas fa-lock"
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                    <input type="password" id="password" placeholder="••••••••" style="padding-left: 2.75rem;" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; font-size: 1rem; margin-top: 1rem;">
                Sign In To Account <i class="fas fa-arrow-right" style="margin-left: 0.5rem;"></i>
            </button>
        </form>

        <p id="errorMsg"
            style="color: var(--accent); text-align: center; margin-top: 1.5rem; font-size: 0.85rem; font-weight: 600; display: none;">
        </p>

        <div style="margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border); text-align: center;">
            <p style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">Authorized Personnel Only</p>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>

</html>
