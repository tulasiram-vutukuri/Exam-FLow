<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ExamPortal</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="animate-slide-up">
    <nav class="nav">
        <h1>ExamPortal <span style="font-weight: 300; font-size: 0.9rem; color: var(--text-muted);">Admin</span></h1>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <div style="text-align: right; border-right: 1px solid var(--border); padding-right: 1.5rem;">
                <p id="adminName" style="font-weight: 700; color: var(--text-main); font-size: 0.95rem;">Admin</p>
                <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 500;">System Administrator</p>
            </div>
            <button class="btn btn-secondary" onclick="logout()" style="padding: 0.5rem 1rem;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
            <div>
                <h2
                    style="font-size: 2.25rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; color: var(--text-main);">
                    Welcome back, <span id="welcomeName">Admin</span>
                </h2>
                <p style="color: var(--text-muted); font-weight: 500;">Here's what's happening with your exams today.
                </p>
            </div>
            <a href="create-exam.html" class="btn btn-primary" style="padding: 0.875rem 1.75rem; border-radius: 12px;">
                <i class="fas fa-plus"></i> Create New Exam
            </a>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1); color: var(--primary);">
                    <i class="fas fa-file-alt"></i>
                </div>
                <div>
                    <p
                        style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
                        Total Exams</p>
                    <h4 id="statTotalExams" style="font-size: 1.5rem; font-weight: 800;">0</h4>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(14, 165, 233, 0.1); color: var(--secondary);">
                    <i class="fas fa-users"></i>
                </div>
                <div>
                    <p
                        style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
                        Total Students</p>
                    <h4 id="statTotalStudents" style="font-size: 1.5rem; font-weight: 800;">0</h4>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(244, 63, 94, 0.1); color: var(--accent);">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div>
                    <p
                        style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
                        Submissions</p>
                    <h4 id="statTotalSubmissions" style="font-size: 1.5rem; font-weight: 800;">0</h4>
                </div>
            </div>
        </div>

        <section>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3 style="font-size: 1.25rem; font-weight: 700;">Recent Examinations</h3>
                <div class="filter-tabs" id="filterContainer">
                    <button class="filter-btn active" onclick="filterExams('all')">All</button>
                    <button class="filter-btn" onclick="filterExams('published')">Published</button>
                    <button class="filter-btn" onclick="filterExams('ongoing')">Ongoing</button>
                    <button class="filter-btn" onclick="filterExams('upcoming')">Upcoming</button>
                </div>
            </div>

            <div id="examList" class="dashboard-grid">
                <!-- Exams will be loaded here -->
            </div>
        </section>
    </div>

    <script src="../js/admin.js"></script>
    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        const username = localStorage.getItem('username') || 'Admin';
        document.getElementById('adminName').innerText = username;
        document.getElementById('welcomeName').innerText = username.split('@')[0];

        // Fetch Stats
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats');
                const stats = await response.json();
                document.getElementById('statTotalExams').innerText = stats.totalExams;
                document.getElementById('statTotalStudents').innerText = stats.totalStudents;
                document.getElementById('statTotalSubmissions').innerText = stats.totalSubmissions;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        loadStats();
    </script>
</body>

</html>
